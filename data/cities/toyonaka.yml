    name: ブロック塀等撤去補助制度
    cap_yen: 200000
    rate: "工事金額の4/5、または1平方メートル当たり13,000円×面積の4/5、または上限20万円のうち最も低い額"
    target: "道路（私道を含む不特定多数が通行する道路）に面し、道路面からの高さ60cm超で安全性が確認できないブロック塀等を全て撤去する工事（1敷地1回限り）"
    period: "撤去工事の着手（契約）前に申込。交付決定通知前の着手・契約は利用不可。"
