local_context:
  - label: 千里ニュータウン
    summary: 市東部から吹田市にまたがる千里丘陵に大阪府が開発したニュータウンで、面積は1,160ha、うち豊中市域は369ha。
    source_url: https://www.city.toyonaka.osaka.jp/machi/senrinyutaunsaisei/index.html
    source_line_note: "千里ニュータウンとは"
    verified_date: 2026-06-22
    confidence: confirmed
  - label: 千里ニュータウン豊中市域の人口推移
    summary: 豊中市域は1975年に約4万3千人、2005年に約2万8千人まで減少し、2015年に約3万5千人まで回復。
    source_url: https://www.city.toyonaka.osaka.jp/machi/senrinyutaunsaisei/index.html
    source_line_note: "人口推移と建替えの動き"
    verified_date: 2026-06-22
    confidence: confirmed
  - label: 都市景観形成マスタープラン
    summary: 豊中市は2014年に都市景観形成マスタープランを策定し、2024年4月1日に改定版を運用開始。
    source_url: https://www.city.toyonaka.osaka.jp/machi/toshikeikan/a001110040010.html
    source_line_note: "都市景観形成マスタープラン"
    verified_date: 2026-06-22
    confidence: confirmed
  - label: 景観計画区域の届出制度
    summary: 景観計画区域の行為は、法令等の申請手続き前に景観面の協議を行う制度として案内されている。
    source_url: https://www.city.toyonaka.osaka.jp/machi/toshikeikan/kaihatsu01.html
    source_line_note: "景観計画区域における行為の届出制度"
    verified_date: 2026-06-22
    confidence: confirmed
  - label: 地区計画の届出
    summary: 地区整備計画のある区域で一定の行為をする場合は、着手30日前までの届出が必要。
    source_url: https://www.city.toyonaka.osaka.jp/machi/kenchiku_kaihatsu/tikukeikakutodokede.html
    source_line_note: "地区計画"
    verified_date: 2026-06-22
    confidence: confirmed
  - label: 建築協定地区
    summary: 豊中市には9か所の建築協定地区がある。
    source_url: https://www.city.toyonaka.osaka.jp/machi/kenchiku_kaihatsu/kentikukyotei.html
    source_line_note: "建築協定地区"
    verified_date: 2026-06-22
    confidence: confirmed
  - label: 住宅・建設統計
    summary: 令和7年豊中市統計書の第9章に、住宅数、所有関係、建て方別専用住宅数、道路、公園などの表がある。
