safety_and_rules:
  block_wall:
    summary: 2018年6月18日の大阪府北部地震でブロック塀倒壊による被害があり、豊中市は所有者責任で点検し、危険時は注意表示と専門家への相談、撤去・補修を求めている。
    source_url: https://www.city.toyonaka.osaka.jp/machi/kenchiku_kaihatsu/blocknotenken.html
