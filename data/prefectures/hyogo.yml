local_profile:
  summary: 神戸・阪神の高低差、播磨の平野部、但馬の雪、淡路の風・塩害を分けて考えたい地域です。
  top_needs:
    - 高低差と擁壁確認
    - 目隠し・駐車場
    - 但馬の雪対策
    - 沿岸部の塩害対策
  area_blocks:
    - name: 神戸・阪神
      note: 坂道、高低差、擁壁、狭小地の駐車場を確認します。
    - name: 播磨
      note: 平坦地の駐車場、庭管理、目隠しを整理します。
    - name: 但馬
      note: 積雪と凍結を踏まえ、耐雪と雪置き場を確認します。
    - name: 淡路
      note: 海風、塩害、台風を見て金物とフェンスを選びます。
  major_areas:
    - 神戸市
    - 姫路市
    - 西宮市
    - 尼崎市
    - 明石市
    - 豊岡市

