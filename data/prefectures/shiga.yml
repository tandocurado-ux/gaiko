local_profile:
  summary: 琵琶湖周辺の風、北部の積雪、南部の住宅地外構を分けて、排水と駐車場を確認したい地域です。
  top_needs:
    - 湖周辺の風対策
    - 北部の雪・凍結対策
    - 駐車場拡張
    - 雨水排水
  area_blocks:
    - name: 大津・湖南
      note: 住宅密度、駐車場、目隠し、道路境界を確認します。
    - name: 草津・守山
      note: 新興住宅地ではオープン外構、宅配ボックス、駐車場2台を整理します。
    - name: 湖東
      note: 風と広い敷地の動線、庭管理を見ます。
    - name: 湖北・湖西
      note: 積雪、凍結、湖岸の風を踏まえて外構を選びます。
  major_areas:
    - 大津市
    - 草津市
    - 守山市
    - 彦根市
    - 長浜市
    - 近江八幡市

