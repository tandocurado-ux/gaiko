local_profile:
  summary: 美濃の暑さ、飛騨の雪と寒さ、山あいの高低差を分けて、外構仕様を変えたい地域です。
  top_needs:
    - 美濃の暑さ対策
    - 飛騨の耐雪・凍結対策
    - 高低差と擁壁確認
    - 駐車場動線
  area_blocks:
    - name: 岐阜・西濃
      note: 暑さ、車利用、住宅密度を見て、カーポートと目隠しを整理します。
    - name: 東濃
      note: 高低差、土留め、道路境界、排水を先に確認します。
    - name: 中濃
      note: 戸建て外構では駐車場、庭管理、フェンスを組み合わせます。
    - name: 飛騨
      note: 積雪・凍結を前提に、耐雪設備と滑りにくい舗装を選びます。
  major_areas:
    - 岐阜市
    - 大垣市
    - 多治見市
    - 各務原市
    - 高山市
    - 可児市

