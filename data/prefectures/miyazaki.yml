local_profile:
  summary: 台風・強雨・沿岸塩害・日射が外構の耐久性に影響しやすく、排水と耐風を優先したい地域です。
  top_needs:
    - 台風時の耐風
    - 豪雨時の排水
    - 塩害対策
    - 暑さと日射対策
  area_blocks:
    - name: 宮崎市周辺
      note: 住宅地の駐車場、目隠し、台風時のフェンス強度を確認します。
    - name: 都城・内陸
      note: 車利用、日射、雨水排水、庭管理を整理します。
    - name: 延岡・日向沿岸
      note: 塩害、強風、浸水想定を確認します。
    - name: 県南
      note: 台風、海風、多雨を踏まえ、金物と排水を重視します。
  major_areas:
    - 宮崎市
    - 都城市
    - 延岡市
    - 日向市
    - 日南市
    - 小林市

