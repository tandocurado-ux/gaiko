local_profile:
  summary: 温暖な沿岸、台風・強風、塩害、富士山麓の寒冷差、地震・津波想定を分けて考えたい地域です。
  top_needs:
    - 台風時の耐風
    - 塩害に強い金物
    - 地震時のブロック塀安全
    - 雨水排水
  area_blocks:
    - name: 静岡・中部
      note: 住宅地の駐車場、目隠し、強風時のフェンス安全を確認します。
    - name: 浜松・西部
      note: 風と日射、広い敷地の駐車場計画を重視します。
    - name: 沼津・伊豆
      note: 塩害、斜面、津波浸水想定を踏まえ、金物と塀を選びます。
    - name: 富士・御殿場
      note: 山麓の寒冷差、雨、勾配を見て排水を整理します。
  major_areas:
    - 静岡市
    - 浜松市
    - 沼津市
    - 富士市
    - 磐田市
    - 藤枝市

