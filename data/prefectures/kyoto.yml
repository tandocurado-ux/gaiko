local_profile:
  summary: 京都市内の景観・狭小地、北部の雪と沿岸風、南部の住宅地外構を分けて確認したい地域です。
  top_needs:
    - 景観・地区計画確認
    - 狭小地の門まわり
    - 北部の雪・塩害対策
    - 道路境界確認
  area_blocks:
    - name: 京都市
      note: 景観、町並み、狭小地、道路境界を確認し、門まわりを整えます。
    - name: 山城
      note: 住宅地の駐車場、目隠し、庭管理の相談が中心です。
    - name: 丹波
      note: 寒暖差と高低差、排水を見て仕様を決めます。
    - name: 丹後・舞鶴
      note: 雪、海風、塩害を踏まえて金物とフェンスを選びます。
  major_areas:
    - 京都市
    - 宇治市
    - 亀岡市
    - 長岡京市
    - 舞鶴市
    - 福知山市

