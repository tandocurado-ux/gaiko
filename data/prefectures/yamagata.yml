local_profile:
  summary: 内陸盆地の雪・寒暖差、山あいの積雪、庄内の風を分け、雪に強い駐車場計画が重要です。
  top_needs:
    - 耐雪カーポート
    - 除雪しやすい土間
    - 凍結しにくい階段
    - 庄内の防風・塩害対策
  area_blocks:
    - name: 山形・村山
      note: 盆地の雪と寒暖差を見て、凍結しにくいアプローチを計画します。
    - name: 米沢・置賜
      note: 積雪と寒冷が強い場所では、基礎深さと雪下ろし動線を確認します。
    - name: 新庄・最上
      note: 多雪地域では雪置き場、耐雪荷重、除雪機の動線を優先します。
    - name: 庄内
      note: 海風、塩害、風の抜けを考え、フェンスと金物を選びます。
  major_areas:
    - 山形市
    - 米沢市
    - 鶴岡市
    - 酒田市
    - 天童市
    - 新庄市

