local_profile:
  summary: 坂道・高低差、島しょ部の塩害、台風時の強風、資材搬入条件を確認したい地域です。
  top_needs:
    - 高低差と擁壁確認
    - 塩害に強い金物
    - 台風時の耐風
    - 資材搬入と道路幅員確認
  area_blocks:
    - name: 長崎市周辺
      note: 坂道、高低差、道路幅員、駐車場の取り方を先に確認します。
    - name: 佐世保・県北
      note: 海風、塩害、斜面、目隠しを整理します。
    - name: 諫早・大村
      note: 住宅地の駐車場、排水、庭管理を重視します。
    - name: 島原・五島・対馬
      note: 塩害、台風、資材搬入、メンテナンス性を確認します。
  major_areas:
    - 長崎市
    - 佐世保市
    - 諫早市
    - 大村市
    - 島原市
    - 五島市

