local_profile:
  summary: 沿岸部の塩害、山間部の高低差・火山性地形、温泉地周辺の景観・排水を確認したい地域です。
  top_needs:
    - 塩害に強い金物
    - 高低差と擁壁確認
    - 雨水排水
    - 景観・温泉地周辺の配慮
  area_blocks:
    - name: 大分・別府
      note: 沿岸風、高低差、住宅地の駐車場を確認します。
    - name: 中津・宇佐
      note: 平坦地の排水、駐車場、庭管理を整理します。
    - name: 日田・玖珠
      note: 内陸の寒暖差、雨、勾配を見て外構を決めます。
    - name: 佐伯・南部沿岸
      note: 塩害、台風、雨水排水を重視します。
  major_areas:
    - 大分市
    - 別府市
    - 中津市
    - 佐伯市
    - 日田市
    - 宇佐市

