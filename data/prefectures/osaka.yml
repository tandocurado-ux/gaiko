region_blocks:
  - name: 大阪市内
    note: 超狭小地、省スペース、オープン外構、駐輪と宅配ボックスの納まりが中心。
    municipalities: [大阪市]
  - name: 北摂
    note: 千里ニュータウンや丘陵住宅地の経年外構、既存塀、植栽、勾配確認。
    municipalities: [豊中市, 吹田市, 池田市, 箕面市, 茨木市, 高槻市, 摂津市, 島本町]
  - name: 北河内
    note: 京阪沿線の住宅密集地と生駒山地側の高低差で、駐車動線と排水が変わる。
    municipalities: [枚方市, 寝屋川市, 守口市, 門真市, 大東市, 四條畷市, 交野市]
  - name: 中河内
    note: 市街地、工業地域近接、山手側の坂で、搬入・目隠し・土留めの確認が必要。
    municipalities: [東大阪市, 八尾市, 柏原市]
  - name: 南河内
    note: 郊外戸建てと一部傾斜地。庭の省管理化、駐車場拡張、擁壁まわりを確認。
    municipalities: [松原市, 羽曳野市, 藤井寺市, 富田林市, 河内長野市, 大阪狭山市, 太子町, 河南町, 千早赤阪村]
  - name: 堺・泉北
    note: 政令市の市街地、泉北ニュータウン、沿岸寄りで素材耐候性が分かれる。
    municipalities: [堺市, 和泉市, 高石市, 泉大津市, 忠岡町]
  - name: 泉南
    note: 岸和田以南の沿岸・山手混在。塩害、強風、庭木、傾斜、排水を分けて確認。
    municipalities: [岸和田市, 貝塚市, 熊取町, 泉佐野市, 田尻町, 泉南市, 阪南市, 岬町]

