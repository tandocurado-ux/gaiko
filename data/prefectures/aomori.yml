local_profile:
  summary: 日本海側の多雪、津軽平野の積雪、太平洋側の風を分けて、耐雪・防風・凍上対策を組み合わせたい地域です。
  top_needs:
    - 雪置き場と除雪動線
    - 耐雪カーポート
    - 凍上しにくい柱基礎
    - 海風に配慮したフェンス
  area_blocks:
    - name: 青森・東青
      note: 積雪と海風を見ながら、カーポートの耐雪仕様とアプローチの滑りにくさを確認します。
    - name: 弘前・津軽
      note: 雪の多い住宅地では、駐車場の奥行き、除雪スペース、境界フェンスの高さをそろえます。
    - name: 八戸・三八
      note: 太平洋側の風と凍結を見て、フェンス強度、土間の勾配、排水先を整理します。
    - name: 下北・上北
      note: 沿岸風、積雪差、広い敷地の車両動線を分けて計画します。
  major_areas:
    - 青森市
    - 弘前市
    - 八戸市
    - 十和田市
    - むつ市
    - 五所川原市

