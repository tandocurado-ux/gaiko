local_profile:
  summary: 内陸の暑さ、からっ風、北部の積雪・凍結、高低差を分けて外構仕様を決めたい地域です。
  top_needs:
    - 強風に強いフェンス
    - 夏の暑さ対策
    - 北部の凍結・積雪対策
    - 駐車場拡張
  area_blocks:
    - name: 前橋・高崎
      note: 車利用、暑さ、強風を見て、カーポートとフェンスの仕様を決めます。
    - name: 太田・伊勢崎
      note: 日射と強風、広い敷地の駐車場計画を重視します。
    - name: 沼田・利根沼田
      note: 積雪・凍結を踏まえ、土間勾配と耐雪設備を確認します。
    - name: 吾妻・山間部
      note: 高低差、凍結、別荘地の管理性を見て素材を選びます。
  major_areas:
    - 前橋市
    - 高崎市
    - 太田市
    - 伊勢崎市
    - 桐生市
    - 沼田市

