local_profile:
  summary: 台風、強風、塩害、強い日射を前提に、耐風・防錆・排水・日陰づくりを重視したい地域です。
  top_needs:
    - 台風時の耐風
    - 塩害に強い金物
    - 強い日射への日陰計画
    - 雨水排水
  area_blocks:
    - name: 那覇・南部
      note: 住宅密度、駐車場、目隠し、台風時の安全性を確認します。
    - name: 中部
      note: 車利用、塩害、日射を見てカーポートとフェンスを選びます。
    - name: 北部
      note: 強風、雨、自然環境との相性、排水を重視します。
    - name: 離島
      note: 塩害、台風、資材搬入、修理しやすい仕様を優先します。
  major_areas:
    - 那覇市
    - 沖縄市
    - 浦添市
    - 宜野湾市
