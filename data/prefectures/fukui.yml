local_profile:
  summary: 日本海側の雪と雨、沿岸部の塩害、嶺北・嶺南の気候差を踏まえて外構を検討したい地域です。
  top_needs:
    - 耐雪カーポート
    - 雪置き場と排水
    - 海沿いの塩害対策
    - 凍結しにくいアプローチ
  area_blocks:
    - name: 福井・坂井
      note: 雪処理、駐車場、カーポート、土間排水を一体で考えます。
    - name: 奥越
      note: 積雪と凍結を前提に、基礎と除雪動線を確認します。
    - name: 丹南
      note: 住宅地の駐車場拡張と庭の管理軽減を重視します。
    - name: 嶺南
      note: 海風、塩害、風を踏まえ、金物とフェンスを選びます。
  major_areas:
    - 福井市
    - 坂井市
    - 越前市
    - 鯖江市
    - 敦賀市
    - 大野市

