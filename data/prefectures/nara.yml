local_profile:
  summary: 盆地の暑さ・寒さ、住宅地の高低差、歴史景観、南部山間の斜面・排水を確認したい地域です。
  top_needs:
    - 高低差と擁壁確認
    - 景観配慮
    - 駐車場拡張
    - 排水と雑草対策
  area_blocks:
    - name: 奈良盆地北部
      note: 住宅地の駐車場、目隠し、道路境界、景観を確認します。
    - name: 中和
      note: 既存住宅の外構リフォームでは、駐車場拡張と庭管理が中心です。
    - name: 西和
      note: 坂道や高低差のある宅地では、階段・スロープ・擁壁を見ます。
    - name: 南部・吉野
      note: 山間地の斜面、排水、落葉、凍結を踏まえます。
  major_areas:
    - 奈良市
    - 橿原市
    - 生駒市
    - 大和郡山市
    - 香芝市
    - 天理市

