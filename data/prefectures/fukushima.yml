local_profile:
  summary: 会津の多雪、中通りの寒暖差、浜通りの風・塩害を分けて、耐雪・排水・防風を整理したい地域です。
  top_needs:
    - 会津の耐雪外構
    - 中通りの駐車場拡張
    - 浜通りの塩害・風対策
    - 高低差と排水確認
  area_blocks:
    - name: 福島・郡山
      note: 住宅地の駐車場、目隠し、勾配、排水をまとめて確認します。
    - name: 会津
      note: 多雪と凍結を前提に、耐雪カーポート、雪置き場、滑りにくい舗装を重視します。
    - name: いわき・浜通り
      note: 海風、塩害、日射を踏まえ、金物と植栽を選びます。
    - name: 白河・県南
      note: 寒暖差と高低差を見て、擁壁、階段、スロープを確認します。
  major_areas:
    - 福島市
    - 郡山市
    - いわき市
    - 会津若松市
    - 白河市
    - 南相馬市

