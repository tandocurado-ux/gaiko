local_profile:
  summary: 伊勢湾岸の塩害、台風・豪雨、南部の多雨、北勢の都市外構を分けて確認したい地域です。
  top_needs:
    - 台風時の耐風
    - 沿岸部の塩害対策
    - 豪雨時の排水
    - ブロック塀安全確認
  area_blocks:
    - name: 津・中勢
      note: 住宅地の駐車場、目隠し、雨水排水を整えます。
    - name: 四日市・北勢
      note: 都市型外構と工業沿岸の塩害・風を分けて確認します。
    - name: 伊勢志摩
      note: 海風、塩害、景観、観光地周辺の条件を見ます。
    - name: 東紀州
      note: 多雨、斜面、台風を踏まえ、排水と土留めを優先します。
  major_areas:
    - 津市
    - 四日市市
    - 鈴鹿市
    - 松阪市
    - 桑名市
    - 伊勢市

