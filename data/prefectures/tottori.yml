local_profile:
  summary: 山陰の雪・雨、沿岸部の塩害、砂丘周辺の風、山間の凍結を整理したい地域です。
  top_needs:
    - 雪と雨に強い駐車場
    - 塩害対策
    - 風に強いフェンス
    - 凍結しにくいアプローチ
  area_blocks:
    - name: 鳥取・東部
      note: 雪、海風、砂を見て、舗装材と金物を選びます。
    - name: 倉吉・中部
      note: 住宅地の駐車場、庭管理、排水を整理します。
    - name: 米子・西部
      note: 海風、雨、雪を踏まえ、カーポートとフェンスを確認します。
    - name: 山間部
      note: 凍結と積雪、勾配、落葉管理を見ます。
  major_areas:
    - 鳥取市
    - 米子市
    - 倉吉市
    - 境港市

