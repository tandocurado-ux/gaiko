local_profile:
  summary: 都市部の狭小外構、瀬戸内沿岸の塩害、山地の土砂災害・高低差を分けて確認したい地域です。
  top_needs:
    - 高低差と土砂災害確認
    - 狭小地の駐車場
    - 沿岸部の塩害対策
    - 雨水排水
  area_blocks:
    - name: 広島都市圏
      note: 坂道、高低差、擁壁、狭小地の駐車場を確認します。
    - name: 福山・備後
      note: 車利用、日射、沿岸風を見て、カーポートとフェンスを選びます。
    - name: 呉・沿岸島しょ
      note: 塩害、風、斜面、道路幅員を確認します。
    - name: 県北
      note: 積雪、凍結、広い敷地の動線を整理します。
  major_areas:
    - 広島市
    - 福山市
    - 呉市
    - 東広島市
    - 尾道市
    - 三原市

