local_profile:
  summary: 都市部の狭小地、郊外の駐車場需要、夏の暑さ、ゲリラ豪雨時の排水を考えたい地域です。
  top_needs:
    - 狭小地の駐車場設計
    - 目隠しフェンス
    - 暑さと西日対策
    - 雨水排水
  area_blocks:
    - name: さいたま・川口
      note: 道路境界、駐車場、目隠し、宅配ボックスをコンパクトにまとめます。
    - name: 川越・所沢
      note: 既存住宅のリフォームでは、駐車場拡張と庭の管理負担軽減が中心です。
    - name: 熊谷・北部
      note: 暑さと日射を考え、カーポート、舗装材、植栽の配置を検討します。
    - name: 秩父
      note: 高低差、擁壁、凍結、排水を先に確認します。
  major_areas:
    - さいたま市
    - 川口市
    - 川越市
    - 所沢市
    - 熊谷市
    - 越谷市

