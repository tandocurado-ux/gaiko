local_profile:
  summary: 湾岸・外房・内陸で塩害、強風、台風、液状化想定、駐車場需要が変わる地域です。
  top_needs:
    - 台風時のカーポート耐風
    - 沿岸部の塩害対策
    - 液状化・浸水想定の確認
    - 目隠しフェンス
  area_blocks:
    - name: 千葉・湾岸
      note: 海風、液状化想定、都市型外構を分けて確認します。
    - name: 船橋・市川・柏
      note: 狭小地の駐車場、目隠し、境界、宅配ボックスを重視します。
    - name: 房総・外房
      note: 台風、塩害、強風に配慮して、フェンスと金物を選びます。
    - name: 北総・内陸
      note: 広い敷地の駐車場と雨水排水を先に整理します。
  major_areas:
    - 千葉市
    - 船橋市
    - 市川市
    - 柏市
    - 松戸市
    - 木更津市

