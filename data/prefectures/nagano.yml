local_profile:
  summary: 寒冷・凍結・積雪・高低差が地域ごとに大きく、基礎、排水、耐雪、景観を同時に確認したい地域です。
  top_needs:
    - 凍上を避ける基礎
    - 耐雪カーポート
    - 高低差と擁壁確認
    - 景観配慮
  area_blocks:
    - name: 長野・北信
      note: 積雪と凍結を見て、カーポート耐雪、雪置き場、土間勾配を確認します。
    - name: 松本・中信
      note: 寒冷差、高低差、景観を踏まえ、素材と植栽を選びます。
    - name: 諏訪・伊那
      note: 凍結、強風、日射を見て、舗装材とフェンスを決めます。
    - name: 軽井沢・東信
      note: 寒冷地と景観規制、別荘地の管理性を先に確認します。
  major_areas:
    - 長野市
    - 松本市
    - 上田市
    - 佐久市
    - 飯田市
    - 諏訪市

