local_profile:
  summary: 狭小地、道路境界、隣地距離、防犯、景観・地区計画、雨水処理を細かく確認したい地域です。
  top_needs:
    - 狭小地の駐車場・門まわり
    - 目隠しと防犯
    - 道路境界とセットバック確認
    - 地区計画・景観確認
  area_blocks:
    - name: 23区
      note: 狭い敷地、接道、隣地距離を見て、門柱・駐輪場・宅配ボックスを整理します。
    - name: 多摩東部
      note: 戸建て外構では駐車場、目隠し、植栽管理のバランスを見ます。
    - name: 多摩西部
      note: 高低差、擁壁、階段、排水を先に確認します。
    - name: 島しょ
      note: 塩害、強風、資材搬入、メンテナンス性を重視します。
  major_areas:
    - 新宿区
    - 世田谷区
    - 練馬区
    - 八王子市
    - 町田市
    - 立川市

