local_profile:
  summary: 瀬戸内の少雨傾向、夏の日射、沿岸の塩害、狭小・平坦地の排水を整理したい地域です。
  top_needs:
    - 暑さと日射対策
    - 沿岸部の塩害対策
    - 駐車場拡張
    - 雨水利用・排水確認
  area_blocks:
    - name: 高松・東讃
      note: 都市型住宅では駐車場、目隠し、日射対策を組み合わせます。
    - name: 丸亀・中讃
      note: 平坦地の駐車場と道路境界、雨水排水を確認します。
    - name: 西讃
      note: 沿岸風、塩害、広い敷地の車両動線を見ます。
    - name: 島しょ
      note: 塩害、強風、資材搬入、メンテナンス性を重視します。
  major_areas:
    - 高松市
    - 丸亀市
    - 坂出市
    - 観音寺市
    - さぬき市
    - 三豊市

