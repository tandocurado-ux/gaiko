local_profile:
  summary: 沿岸部の塩害・台風、南部の多雨、山間地の斜面を踏まえ、排水と耐風を優先したい地域です。
  top_needs:
    - 台風時の耐風
    - 塩害に強い金物
    - 豪雨時の排水
    - 斜面・擁壁確認
  area_blocks:
    - name: 和歌山・紀北
      note: 住宅地の駐車場、目隠し、台風時のフェンス強度を確認します。
    - name: 海南・有田
      note: 海風と塩害、斜面、排水を見て外構を組みます。
    - name: 紀中・紀南
      note: 多雨、台風、沿岸風を踏まえ、土間勾配と排水を優先します。
    - name: 山間部
      note: 高低差、土留め、落葉、雨水処理を確認します。
  major_areas:
    - 和歌山市
    - 田辺市
    - 橋本市
    - 海南市
    - 岩出市
    - 新宮市

