local_profile:
  summary: 台風・豪雨・沿岸塩害・山間部の高低差が外構仕様に直結するため、排水と耐風を最優先で確認したい地域です。
  top_needs:
    - 豪雨時の排水
    - 台風時の耐風
    - 塩害対策
    - 斜面・擁壁確認
  area_blocks:
    - name: 高知市周辺
      note: 住宅地の駐車場、目隠し、豪雨時の排水を確認します。
    - name: 東部沿岸
      note: 台風、塩害、強風を踏まえ、金物とフェンスを選びます。
    - name: 西部沿岸
      note: 海風、多雨、浸水想定を確認します。
    - name: 山間部
      note: 斜面、擁壁、土砂災害想定、排水経路を先に見ます。
  major_areas:
    - 高知市
    - 南国市
    - 四万十市
    - 香南市
    - 土佐市
    - 須崎市

