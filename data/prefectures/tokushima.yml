local_profile:
  summary: 台風・豪雨、沿岸部の塩害、吉野川流域の浸水想定、山間部の高低差を確認したい地域です。
  top_needs:
    - 台風時の耐風
    - 浸水想定と排水
    - 塩害対策
    - 斜面・擁壁確認
  area_blocks:
    - name: 徳島・鳴門
      note: 海風、台風、住宅地の駐車場を見て仕様を決めます。
    - name: 吉野川流域
      note: 浸水想定、雨水排水、土間勾配を先に確認します。
    - name: 阿南・南部沿岸
      note: 塩害、強風、多雨を踏まえ、金物とフェンスを選びます。
    - name: 山間部
      note: 高低差、土留め、落石・排水を確認します。
  major_areas:
    - 徳島市
    - 鳴門市
    - 阿南市
    - 吉野川市
    - 小松島市
    - 美馬市

