local_profile:
  summary: 多雪・寒冷・日本海側の風を前提に、雪処理、耐雪カーポート、凍上、排水を優先したい地域です。
  top_needs:
    - 雪置き場の確保
    - 耐雪カーポート
    - 融雪・排水の確認
    - 凍上を避ける基礎
  area_blocks:
    - name: 秋田市周辺
      note: 住宅地の除雪動線、風、雪置き場を一体で見ます。
    - name: 横手・湯沢
      note: 積雪が多い内陸部では、カーポート耐雪、屋根雪、物置配置を先に決めます。
    - name: 大館・鹿角
      note: 寒冷差と凍結を考え、門柱・フェンス柱・土間の下地を確認します。
    - name: 男鹿・能代沿岸
      note: 海風と塩害に配慮して、金物、フェンス、照明を選びます。
  major_areas:
    - 秋田市
    - 横手市
    - 大館市
    - 大仙市
    - 能代市
    - 由利本荘市

