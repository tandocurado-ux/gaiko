local_profile:
  summary: 内陸盆地の暑さ・寒さ、山麓の凍結、高低差、日射を踏まえた外構計画が必要な地域です。
  top_needs:
    - 凍結しにくいアプローチ
    - 日射・西日対策
    - 高低差と擁壁確認
    - 駐車場拡張
  area_blocks:
    - name: 甲府盆地
      note: 暑さ、日射、車利用を見て、カーポートと舗装材を選びます。
    - name: 峡東・峡南
      note: 傾斜地や農地隣接の敷地では、排水と土留めを先に確認します。
    - name: 富士北麓
      note: 寒冷、凍結、積雪を踏まえ、滑りにくさと基礎を重視します。
    - name: 北杜・八ヶ岳周辺
      note: 寒冷、風、別荘地の管理性を見て素材を決めます。
  major_areas:
    - 甲府市
    - 甲斐市
    - 南アルプス市
    - 笛吹市
    - 富士吉田市
    - 北杜市

