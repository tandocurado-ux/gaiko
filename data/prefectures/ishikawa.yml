local_profile:
  summary: 加賀・能登で積雪、強風、塩害、景観配慮が変わり、金物と塀の安全性を確認したい地域です。
  top_needs:
    - 雪と雨に強い駐車場
    - 沿岸部の塩害対策
    - 強風時のフェンス強度
    - 景観・道路境界確認
  area_blocks:
    - name: 金沢・加賀
      note: 雨雪、景観、住宅密度を見て、門まわりと目隠しを整えます。
    - name: 白山・野々市
      note: 戸建て外構では駐車場、土間、排水を先に確認します。
    - name: 能登
      note: 強風、塩害、地震後の塀・擁壁安全性を重視します。
    - name: 奥能登
      note: 資材搬入、風、塩害、維持管理しやすい外構を優先します。
  major_areas:
    - 金沢市
    - 白山市
    - 小松市
    - 加賀市
    - 七尾市
    - 輪島市

