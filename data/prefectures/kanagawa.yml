local_profile:
  summary: 横浜・川崎の都市型外構、湘南・三浦の塩害、県西の高低差を分けて確認したい地域です。
  top_needs:
    - 高低差と擁壁確認
    - 塩害に強い金物
    - 狭小地の駐車場
    - 目隠し・防犯
  area_blocks:
    - name: 横浜・川崎
      note: 道路境界、高低差、駐車場、目隠しをコンパクトにまとめます。
    - name: 湘南・三浦
      note: 潮風、砂、強風を見て、金物と植栽を選びます。
    - name: 県央
      note: 車利用と住宅密度を踏まえ、駐車場とアプローチを整理します。
    - name: 県西・箱根
      note: 斜面、擁壁、雨水、凍結の可能性を確認します。
  major_areas:
    - 横浜市
    - 川崎市
    - 相模原市
    - 藤沢市
    - 横須賀市
    - 小田原市

