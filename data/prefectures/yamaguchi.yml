local_profile:
  summary: 瀬戸内・日本海・内陸で風、塩害、雨、日射が変わり、金物と排水を分けて確認したい地域です。
  top_needs:
    - 塩害に強い金物
    - 台風時の耐風
    - 雨水排水
    - 駐車場と庭の管理軽減
  area_blocks:
    - name: 山口・防府
      note: 住宅地の駐車場、目隠し、庭管理を整理します。
    - name: 下関・長門沿岸
      note: 海風、塩害、強風を踏まえ、金物とフェンスを選びます。
    - name: 宇部・周南
      note: 瀬戸内側の工業沿岸では塩害と風を確認します。
    - name: 岩国・県東部
      note: 高低差と雨水、道路境界を見ます。
  major_areas:
    - 山口市
    - 下関市
    - 宇部市
    - 周南市
    - 岩国市
    - 防府市

