local_profile:
  summary: 都市部の狭小外構、郊外の駐車場需要、沿岸の塩害、豪雨時の排水を分けて考えたい地域です。
  top_needs:
    - 狭小地の駐車場
    - 目隠しフェンス
    - 豪雨時の排水
    - 沿岸部の塩害対策
  area_blocks:
    - name: 福岡都市圏
      note: 狭小地、駐車場、宅配ボックス、目隠しをコンパクトにまとめます。
    - name: 北九州
      note: 沿岸風、塩害、坂道、高低差を確認します。
    - name: 筑後
      note: 平坦地の排水、駐車場拡張、庭管理を重視します。
    - name: 筑豊
      note: 住宅地の道路境界、土間、フェンスを整理します。
  major_areas:
