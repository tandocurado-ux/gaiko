local_profile:
  summary: 内陸の寒冷・積雪、沿岸の風と津波浸水想定、山あいの高低差を分けて考えたい地域です。
  top_needs:
    - 凍結しにくいアプローチ
    - 雪と風に強いカーポート
    - 高低差と擁壁の確認
    - 沿岸部の塩害対策
  area_blocks:
    - name: 盛岡・県央
      note: 寒冷地の凍結、積雪、住宅地の駐車動線を見て、土間と階段の滑りを抑えます。
    - name: 花巻・北上・奥州
      note: 広めの敷地では車の転回、物置、庭の管理範囲を先に決めます。
    - name: 沿岸
      note: 海風、塩害、浸水想定を確認し、金物と塀の安全性を優先します。
    - name: 県北・山間部
      note: 積雪、凍上、除雪機の動線を踏まえて外構を組みます。
  major_areas:
    - 盛岡市
    - 花巻市
    - 北上市
    - 奥州市
    - 一関市
    - 宮古市

