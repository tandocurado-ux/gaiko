local_profile:
  summary: 瀬戸内の少雨傾向、南部の都市外構、北部の積雪・寒冷、山あいの高低差を分けて確認したい地域です。
  top_needs:
    - 駐車場拡張
    - 北部の雪・凍結対策
    - 暑さと西日対策
    - 排水と境界確認
  area_blocks:
    - name: 岡山・倉敷
      note: 都市型住宅では駐車場、目隠し、宅配ボックス、道路境界を整理します。
    - name: 備前・瀬戸内
      note: 沿岸風と日射、塩害の可能性を見て素材を選びます。
    - name: 備中・井笠
      note: 高低差や農地隣接では排水と土留めを先に確認します。
    - name: 美作・県北
      note: 積雪・凍結を踏まえ、滑りにくい舗装とカーポートを検討します。
  major_areas:
    - 岡山市
    - 倉敷市
    - 津山市
    - 総社市
    - 玉野市
    - 笠岡市

