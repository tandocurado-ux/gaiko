local_profile:
  summary: 都市部の狭小外構、郊外の駐車場需要、台風時の強風、夏の暑さを踏まえたい地域です。
  top_needs:
    - 駐車場2台以上の計画
    - 台風時のカーポート耐風
    - 目隠しフェンス
    - 暑さと西日対策
  area_blocks:
    - name: 名古屋・尾張
      note: 狭小地と駐車場需要を見て、門柱・宅配ボックス・目隠しを配置します。
    - name: 三河
      note: 車複数台、庭の管理、カーポート需要を整理します。
    - name: 知多・西三河沿岸
      note: 塩害と風を見て、金物とフェンスを選びます。
    - name: 東三河
      note: 風、雨、広い敷地の動線を確認します。
  major_areas:
    - 名古屋市
    - 豊田市
    - 岡崎市
    - 一宮市
    - 豊橋市
    - 春日井市

