local_profile:
  summary: 湿った雪、凍結、海沿いの塩害、広い駐車場需要を踏まえて耐雪・排水を整えたい地域です。
  top_needs:
    - 耐雪カーポート
    - 除雪しやすい土間
    - 融雪・排水
    - 塩害に強い金物
  area_blocks:
    - name: 富山・射水
      note: 住宅地では積雪、車複数台、雪置き場をセットで確認します。
    - name: 高岡・氷見
      note: 海風と雪を見て、金物・フェンス・カーポートを選びます。
    - name: 砺波・南砺
      note: 広い敷地と雪処理を踏まえ、動線を広めに取ります。
    - name: 黒部・新川
      note: 山側の積雪差、沿岸の塩害、風を分けて計画します。
  major_areas:
    - 富山市
    - 高岡市
    - 射水市
    - 砺波市
    - 南砺市
    - 黒部市

