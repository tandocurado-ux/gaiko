local_profile:
  summary: 日本海側の雨・雪・塩害、山間部の高低差、石見・出雲の地域差を分けて考えたい地域です。
  top_needs:
    - 塩害に強い金物
    - 雪と雨の排水
    - 高低差と擁壁確認
    - 庭の管理負担軽減
  area_blocks:
    - name: 松江・出雲
      note: 日本海側の雨風、住宅地の駐車場、目隠しを確認します。
    - name: 石見
      note: 沿岸風と塩害、斜面、排水を踏まえます。
    - name: 雲南・奥出雲
      note: 積雪、凍結、高低差を見て外構を選びます。
    - name: 隠岐
      note: 強風、塩害、資材搬入、メンテナンス性を重視します。
  major_areas:
    - 松江市
    - 出雲市
    - 浜田市
    - 益田市
    - 大田市
    - 雲南市

