local_profile:
  summary: 平野部の水はけ、有明海沿岸の塩害・浸水想定、郊外住宅の駐車場需要を確認したい地域です。
  top_needs:
    - 雨水排水と水はけ
    - 駐車場拡張
    - 沿岸部の塩害対策
    - 浸水想定確認
  area_blocks:
    - name: 佐賀平野
      note: 平坦地の排水、土間勾配、駐車場範囲を先に決めます。
    - name: 鳥栖・東部
      note: 車利用と住宅密度を踏まえ、駐車場と目隠しを整えます。
    - name: 唐津・玄海沿岸
      note: 海風、塩害、強風を見て金物を選びます。
    - name: 有明海沿岸
      note: 浸水想定、塩害、排水先を確認します。
  major_areas:
    - 佐賀市
    - 唐津市
    - 鳥栖市
    - 伊万里市
    - 武雄市
    - 鹿島市

