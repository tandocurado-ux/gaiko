local_profile:
  summary: 仙台圏の都市型外構、内陸の凍結、沿岸の塩害・浸水想定を分けて整理したい地域です。
  top_needs:
    - 都市部の駐車場拡張
    - 目隠しフェンス
    - 沿岸部の塩害対策
    - 雨水排水と浸水想定
  area_blocks:
    - name: 仙台都市圏
      note: 狭小地や高低差のある宅地では、駐車場、目隠し、道路境界を丁寧に確認します。
    - name: 大崎・栗原
      note: 冬の凍結、広い敷地、車複数台の動線を優先します。
    - name: 石巻・気仙沼沿岸
      note: 海風、塩害、浸水想定を踏まえ、金物とブロック塀の安全性を確認します。
    - name: 県南
      note: 住宅地と農地寄りの敷地差を見て、土間範囲と排水先を決めます。
  major_areas:
    - 仙台市
    - 石巻市
    - 大崎市
    - 名取市
    - 多賀城市
    - 気仙沼市

