local_profile:
  summary: 台風、桜島の降灰、沿岸塩害、離島の強風・資材搬入を確認し、掃除しやすい外構にしたい地域です。
  top_needs:
    - 降灰に強い舗装・排水
    - 台風時の耐風
    - 塩害対策
    - 離島の搬入・維持管理
  area_blocks:
    - name: 鹿児島市周辺
      note: 降灰、雨水排水、駐車場、掃除しやすさを重視します。
    - name: 霧島・姶良
      note: 火山灰、日射、住宅地の駐車場需要を見ます。
    - name: 大隅・薩摩半島
      note: 台風、塩害、豪雨を踏まえ、金物とフェンスを選びます。
    - name: 奄美・離島
      note: 強風、塩害、資材搬入、メンテナンス性を確認します。
  major_areas:
    - 鹿児島市
    - 霧島市
    - 鹿屋市
    - 薩摩川内市
    - 姶良市
    - 奄美市

