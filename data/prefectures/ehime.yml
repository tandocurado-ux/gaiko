local_profile:
  summary: 瀬戸内沿岸の塩害、南予の斜面・豪雨、台風時の風を分けて計画したい地域です。
  top_needs:
    - 塩害に強い金物
    - 台風時の耐風
    - 斜面・擁壁確認
    - 雨水排水
  area_blocks:
    - name: 松山・中予
      note: 住宅地の駐車場、目隠し、庭管理を整理します。
    - name: 今治・東予
      note: 海風、塩害、工業沿岸の環境を見て金物を選びます。
    - name: 新居浜・西条
      note: 車利用、日射、排水を先に確認します。
    - name: 宇和島・南予
      note: 斜面、多雨、台風、塩害を踏まえ、土留めと排水を重視します。
  major_areas:
    - 松山市
    - 今治市
    - 新居浜市
    - 西条市
    - 宇和島市
    - 大洲市

