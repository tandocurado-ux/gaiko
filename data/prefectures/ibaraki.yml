local_profile:
  summary: 平野部の駐車場需要、沿岸の塩害、台風時の強風、郊外の広い敷地を分けて計画したい地域です。
  top_needs:
    - 駐車場拡張
    - 台風時のフェンス強度
    - 沿岸部の塩害対策
    - 雨水排水
  area_blocks:
    - name: 水戸・県央
      note: 戸建て外構では駐車場、門柱、目隠し、庭の管理範囲を先に決めます。
    - name: つくば・県南
      note: 新興住宅地ではデザイン統一、オープン外構、宅配ボックス需要を見ます。
    - name: 鹿行・沿岸
      note: 海風と塩害、強風に配慮して金物とフェンスを選びます。
    - name: 県北・山間
      note: 高低差と排水、土留め、アプローチの安全性を確認します。
  major_areas:
    - 水戸市
    - つくば市
    - 日立市
    - 土浦市
    - 取手市
    - 鹿嶋市

