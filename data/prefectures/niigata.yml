local_profile:
  summary: 日本海側の多雪・塩害、内陸の豪雪、平野部の広い敷地を分けて耐雪外構を考えたい地域です。
  top_needs:
    - 耐雪カーポート
    - 雪置き場と除雪動線
    - 海沿いの塩害対策
    - 凍上・排水確認
  area_blocks:
    - name: 新潟・下越
      note: 沿岸風と積雪を見て、カーポート、金物、排水を確認します。
    - name: 長岡・中越
      note: 多雪地域では耐雪荷重、雪下ろし、雪置き場を先に決めます。
    - name: 上越
      note: 湿った雪と海風を踏まえ、土間勾配と金物を選びます。
    - name: 魚沼・山間部
      note: 豪雪、凍結、除雪機動線を前提に外構を組みます。
  major_areas:
    - 新潟市
    - 長岡市
    - 上越市
    - 三条市
    - 柏崎市
    - 南魚沼市

