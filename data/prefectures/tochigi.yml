local_profile:
  summary: 内陸の寒暖差、雷雨、郊外住宅の車複数台需要、北部の凍結・積雪を整理したい地域です。
  top_needs:
    - 駐車場2台以上の動線
    - 雷雨時の排水
    - 北部の凍結対策
    - 目隠しと境界整理
  area_blocks:
    - name: 宇都宮・県央
      note: 車利用を前提に、土間範囲、カーポート、宅配ボックスをまとめます。
    - name: 小山・県南
      note: 平坦地の排水、道路境界、目隠しフェンスを確認します。
    - name: 那須・県北
      note: 寒冷・積雪・別荘地の勾配を見て、舗装材と排水を選びます。
    - name: 足利・佐野
      note: 暑さと西日、庭の雑草対策、駐車場拡張の相談が多い地域です。
  major_areas:
    - 宇都宮市
    - 小山市
    - 栃木市
    - 足利市
    - 那須塩原市
    - 佐野市

